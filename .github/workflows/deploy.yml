name: Deploy to Zeabur

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target (production | staging)"
        required: true
        default: "production"
      service:
        description: "Service to deploy: litellm-proxy | browser-agent | all"
        required: true
        default: "all"

jobs:
  deploy-litellm-proxy:
    name: "Deploy Task 1 — litellm-proxy"
    runs-on: ubuntu-latest
    if: ${{ inputs.service == 'litellm-proxy' || inputs.service == 'all' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Authenticate Zeabur
        run: npx zeabur auth login --token ${{ secrets.ZEABUR_TOKEN }}
      - name: Deploy litellm-proxy
        run: npx zeabur deploy --project-id 69b56d73d1eb012bec9fe7e8 --service-id 69b56de375c26871ff4c5b76 --interactive=false
        working-directory: litellm-proxy/

  deploy-browser-agent:
    name: "Deploy Task 3 — browser-agent"
    runs-on: ubuntu-latest
    if: ${{ inputs.service == 'browser-agent' || inputs.service == 'all' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Authenticate Zeabur
        run: npx zeabur auth login --token ${{ secrets.ZEABUR_TOKEN }}
      - name: Deploy browser-agent
        run: npx zeabur deploy --project-id 69b56d73d1eb012bec9fe7e8 --service-id 69b56d8575c26871ff4c5b48 --interactive=false
        working-directory: browser-agent/
